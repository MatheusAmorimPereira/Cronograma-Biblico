<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Cronograma Bíblico Profissional</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0f172a;
  --card:#111827;
  --card2:#1e293b;
  --text:#f8fafc;
  --muted:#94a3b8;
  --primary:#3b82f6;
  --primary2:#2563eb;
  --green:#22c55e;
  --danger:#ef4444;
  --border:#334155;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:linear-gradient(135deg,#020617,#0f172a);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding:30px;
}

.container{
  max-width:1400px;
  margin:auto;
}

.header{
  margin-bottom:30px;
}

.title{
  font-size:42px;
  font-weight:700;
  margin-bottom:10px;
}

.subtitle{
  color:var(--muted);
  font-size:16px;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.stat-card{
  background:rgba(17,24,39,0.9);
  border:1px solid var(--border);
  border-radius:20px;
  padding:25px;
  backdrop-filter:blur(10px);
}

.stat-title{
  color:var(--muted);
  font-size:14px;
  margin-bottom:10px;
}

.stat-number{
  font-size:36px;
  font-weight:700;
}

.progress-container{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:25px;
  margin-bottom:30px;
}

.progress-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.progress-title{
  font-size:18px;
  font-weight:600;
}

.progress-percent{
  font-size:20px;
  font-weight:700;
  color:var(--green);
}

.progress-bar{
  width:100%;
  height:24px;
  background:#0f172a;
  border-radius:50px;
  overflow:hidden;
  border:1px solid var(--border);
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#3b82f6,#22c55e);
  transition:0.4s;
}

.actions{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:30px;
}

button{
  border:none;
  padding:14px 22px;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
  font-size:15px;
}

.primary-btn{
  background:var(--primary);
  color:white;
}

.primary-btn:hover{
  background:var(--primary2);
}

.green-btn{
  background:var(--green);
  color:white;
}

.green-btn:hover{
  opacity:0.9;
}

.red-btn{
  background:var(--danger);
  color:white;
}

.red-btn:hover{
  opacity:0.9;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:25px;
}

.card{
  background:rgba(17,24,39,0.95);
  border:1px solid var(--border);
  border-radius:22px;
  padding:25px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px);
}

.card-title{
  font-size:24px;
  margin-bottom:20px;
  font-weight:700;
}

.reading{
  background:var(--card2);
  border:1px solid #243244;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:14px;
}

.reading:hover{
  border-color:#3b82f6;
}

.reading input{
  width:20px;
  height:20px;
  cursor:pointer;
}

.reading label{
  cursor:pointer;
  width:100%;
  line-height:1.5;
}

.completed{
  text-decoration:line-through;
  opacity:0.6;
}

footer{
  margin-top:50px;
  text-align:center;
  color:var(--muted);
  font-size:14px;
}

@media(max-width:700px){

  body{
    padding:15px;
  }

  .title{
    font-size:32px;
  }

  .actions{
    flex-direction:column;
  }

  button{
    width:100%;
  }

}

@media print{

  body{
    background:white;
    color:black;
    padding:10px;
  }

  .actions{
    display:none;
  }

  .card{
    background:white;
    color:black;
    border:1px solid #ccc;
    break-inside:avoid;
  }

  .reading{
    background:#f3f4f6;
    color:black;
  }

  .stat-card{
    background:white;
    color:black;
    border:1px solid #ccc;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1 class="title">Cronograma Bíblico Completo</h1>
<p class="subtitle">
Acompanhe sua leitura da Bíblia inteira com progresso automático e estatísticas em tempo real.
</p>
</div>

<div class="dashboard">

<div class="stat-card">
<div class="stat-title">Total de Leituras</div>
<div class="stat-number" id="totalLeituras">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Concluídas</div>
<div class="stat-number" id="concluidas">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Restantes</div>
<div class="stat-number" id="restantes">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Progresso Total</div>
<div class="stat-number" id="percentual">0%</div>
</div>

</div>

<div class="progress-container">

<div class="progress-header">
<div class="progress-title">Seu progresso</div>
<div class="progress-percent" id="percentText">0%</div>
</div>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

</div>

<div class="actions">

<button class="primary-btn" onclick="window.print()">
Imprimir
</button>

<button class="green-btn" onclick="compartilhar()">
Compartilhar
</button>

<button class="red-btn" onclick="resetar()">
Resetar progresso
</button>

</div>

<div class="grid" id="grid"></div>

<footer>
"Lâmpada para os meus pés é a tua palavra." — Salmos 119:105
</footer>

</div>

<script>

const plano = {

"Janeiro":[
"Gênesis 1–25",
"Gênesis 26–50",
"Êxodo 1–20"
],

"Fevereiro":[
"Êxodo 21–40",
"Levítico",
"Números 1–20"
],

"Março":[
"Números 21–36",
"Deuteronômio",
"Josué"
],

"Abril":[
"Juízes",
"Rute",
"1 Samuel"
],

"Maio":[
"2 Samuel",
"1 Reis",
"2 Reis"
],

"Junho":[
"1 Crônicas",
"2 Crônicas",
"Esdras e Neemias"
],

"Julho":[
"Ester",
"Jó",
"Salmos 1–75"
],

"Agosto":[
"Salmos 76–150",
"Provérbios",
"Eclesiastes"
],

"Setembro":[
"Cantares",
"Isaías",
"Jeremias"
],

"Outubro":[
"Lamentações",
"Ezequiel",
"Daniel"
],

"Novembro":[
"Profetas Menores",
"Mateus",
"Marcos"
],

"Dezembro":[
"Lucas",
"João",
"Atos até Apocalipse"
]

};

const grid = document.getElementById("grid");

let contador = 0;

for(let mes in plano){

  const card = document.createElement("div");
  card.className = "card";

  let html = `
    <h2 class="card-title">${mes}</h2>
  `;

  plano[mes].forEach(item=>{

    html += `
      <div class="reading">
        <input type="checkbox" id="check${contador}" class="check">
        <label for="check${contador}">
          ${item}
        </label>
      </div>
    `;

    contador++;

  });

  card.innerHTML = html;

  grid.appendChild(card);

}

const checks = document.querySelectorAll(".check");

function atualizar(){

  let concluido = 0;

  checks.forEach((check,index)=>{

    const label = check.nextElementSibling;

    if(check.checked){

      concluido++;

      label.classList.add("completed");

    }else{

      label.classList.remove("completed");

    }

    localStorage.setItem("biblia-"+index,check.checked);

  });

  const total = checks.length;
  const restante = total - concluido;
  const porcentagem = Math.round((concluido/total)*100);

  document.getElementById("totalLeituras").innerText = total;
  document.getElementById("concluidas").innerText = concluido;
  document.getElementById("restantes").innerText = restante;

  document.getElementById("percentual").innerText = porcentagem + "%";

  document.getElementById("percentText").innerText = porcentagem + "%";

  document.getElementById("progressFill").style.width =
  porcentagem + "%";

}

checks.forEach((check,index)=>{

  const salvo = localStorage.getItem("biblia-"+index);

  if(salvo === "true"){
    check.checked = true;
  }

  check.addEventListener("change",atualizar);

});

function resetar(){

  const confirmar = confirm(
    "Deseja realmente apagar todo o progresso?"
  );

  if(confirmar){

    checks.forEach((check,index)=>{

      check.checked = false;

      localStorage.removeItem("biblia-"+index);

    });

    atualizar();

  }

}

async function compartilhar(){

  const texto =
`Estou usando este Cronograma Bíblico para acompanhar minha leitura da Bíblia inteira.`;

  if(navigator.share){

    try{

      await navigator.share({
        title:"Cronograma Bíblico",
        text:texto,
        url:window.location.href
      });

    }catch(e){}

  }else{

    navigator.clipboard.writeText(texto);

    alert("Texto copiado para compartilhar.");

  }

}

atualizar();

</script>

</body>
</html>
